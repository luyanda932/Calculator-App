<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div id="container">
        <input id="display" readonly>
        <div id="keys">
        <button class="operatorButton" onclick="appendToDisplay('+')">+</button>
        <button class="digitButton" onclick="appendToDisplay('7')">7</button>
        <button class="digitButton" onclick="appendToDisplay('8')">8</button>
        <button class="digitButton" onclick="appendToDisplay('9')">9</button>

        <button class="operatorButton" onclick="appendToDisplay('-')">-</button>
        <button class="digitButton" onclick="appendToDisplay('4')">4</button>
        <button class="digitButton" onclick="appendToDisplay('5')">5</button>
        <button class="digitButton" onclick="appendToDisplay('6')">6</button>

        <button class="operatorButton" onclick="appendToDisplay('*')">*</button>
        <button class="digitButton" onclick="appendToDisplay('1')">1</button>
        <button class="digitButton" onclick="appendToDisplay('2')">2</button>
        <button class="digitButton" onclick="appendToDisplay('3')">3</button>

        <button class="operatorButton" onclick="appendToDisplay('/')">/</button>
        <button class="digitButton" onclick="appendToDisplay('0')">0</button>
        <button class="digitButton" onclick="appendToDisplay('.')">.</button>
        <button class="operatorButton" onclick="calculate()">=</button>
        <button class="acButton" onclick="clearDisplay()">AC</button>

        <button class="backspaceButton" onclick="backspace()" style="align-items: center; justify-content: center">&#9003</button>
    </div>
</body>

</html>
